# Persistent Volume for Cluster Management Service
# -------------------------------------------------
# This volume stores cluster management data (e.g. job state, scheduler metadata).
# Deploy this BEFORE the service: tfy deploy -f volume.yaml --no-wait
#
# CUSTOMER SETUP:
#   1. Replace "name" with a unique volume name for your environment
#   2. Replace "workspace_fqn" with your TrueFoundry workspace FQN
#      Format: <cluster>:<workspace>
#   3. Replace "host" under volume_browser with your desired endpoint
#      Format: <volume-name>-<workspace>.tfy-usea1-ctl.<domain>
#   4. Adjust "size" (in GB) and "storage_class" as needed for your cluster

name: cluster-management-data-test
type: volume
config:
  # Size in GB
  size: 1
  type: dynamic
  # Storage class must match what's available in your cluster (e.g. efs-sc, gp3, etc.)
  storage_class: efs-sc

# {{CUSTOMER_WORKSPACE_FQN}} - Your TrueFoundry workspace FQN
workspace_fqn: tfy-usea1-devtest:vivek-ks-devtest

volume_browser:
  endpoint:
    # {{CUSTOMER_VOLUME_HOST}} - Endpoint for the volume browser UI
    host: cluster-management-data-test-vivek-ks-devtest.tfy-usea1-ctl.devtest.truefoundry.tech
